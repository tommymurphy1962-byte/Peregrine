[phases.setup]
nixPkgs = ["nodejs_20", "chromium", "nss", "atk", "cups", "xkbcommon", "pango", "cairo", "glib"]

[phases.install]
cmds = [
  "npm install",
  "cd frontend && npm install && npm run build && cd .."
]

[phases.build]
cmds = ["node server/db-init.js"]

[start]
cmd = "node server/index.js"

[variables]
PLAYWRIGHT_BROWSERS_PATH = "/usr/bin"
PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"
NODE_ENV = "production"
