[phases.setup]
nixPkgs = ["nodejs_20", "nss", "atk", "cups", "libxkbcommon", "pango", "cairo", "glib", "alsa-lib", "mesa"]

[phases.install]
cmds = [
  "npm install",
  "npx playwright install chromium",
  "cd frontend && npm install && npm run build && cd .."
]

[phases.build]
cmds = ["node server/db-init.js"]

[start]
cmd = "node server/index.js"

[variables]
NODE_ENV = "production"
PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "0"
